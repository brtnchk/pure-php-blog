services:
    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - ./:/var/www/html
            - /var/www/html/vendor
        environment:
            DB_HOST: mysql
            DB_PORT: 3306
            DB_NAME: blog
            DB_USER: blog
            DB_PASS: blog
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: mysql:8.0
        command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: blog
            MYSQL_USER: blog
            MYSQL_PASSWORD: blog
        ports:
            - "3307:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    mysql-data:
